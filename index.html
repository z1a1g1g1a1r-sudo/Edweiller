<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ReOrg Médico - Estável v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --text: #e6edf3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; background: #010409; color: white; border: 1px solid #30363d; border-radius: 8px; padding: 12px; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: #0d1117; }
        .btn-green { background: var(--green); color: white; display: none; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; background: #010409; font-size: 13px; border-left: 4px solid var(--blue); min-height: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>⚡ Assistente de Evolução UTI</h2>
        <textarea id="modeloText" placeholder="Cole seu modelo aqui..."></textarea>
        <input type="file" id="fileInput" multiple accept=".txt" style="margin-top:20px; display:block;">
    </div>
    <div class="card">
        <div id="status">Aguardando arquivos...</div>
        <button class="btn btn-blue" id="btnRun">🚀 REORGANIZAR AGORA</button>
        <button class="btn btn-green" id="btnZip">📥 BAIXAR TODAS AS EVOLUÇÕES (.ZIP)</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4";
    const btnRun = document.getElementById('btnRun');
    const btnZip = document.getElementById('btnZip');
    const status = document.getElementById('status');
    let results = [];

    btnRun.onclick = async () => {
        const fileElement = document.getElementById('fileInput');
        const files = fileElement.files;
        const modelo = document.getElementById('modeloText').value;

        if (!files.length || !modelo) return alert("Selecione arquivos e cole o modelo.");

        btnRun.disabled = true;
        btnRun.innerText = "Processando...";
        results = [];
        status.innerHTML = "Iniciando processamento...";

        // Processamos um por um para garantir que nada se perca
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerHTML = `⏳ Processando ${i + 1}/${files.length}: ${file.name}`;
            
            try {
                const text = await file.text();
                if (!text.trim()) continue;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Reorganize a evolução abaixo seguindo este modelo:\n\nMODELO:\n${modelo}\n\nEVOLUÇÃO:\n${text}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const output = data.candidates[0].content.parts[0].text;
                    results.push({ name: file.name, content: output });
                } else {
                    console.error("Erro na resposta da IA para: " + file.name);
                }
            } catch (e) {
                status.innerHTML = `❌ Erro no arquivo ${file.name}`;
            }
        }

        if (results.length > 0) {
            status.innerHTML = `<b style="color:var(--green)">✅ Concluído! ${results.length} evoluções prontas.</b>`;
            btnZip.style.display = "block";
        } else {
            status.innerHTML = `<b style="color:red">⚠️ Nenhum arquivo foi processado. Verifique o conteúdo dos .txt</b>`;
        }
        btnRun.disabled = false;
        btnRun.innerText = "🚀 REORGANIZAR AGORA";
    };

    btnZip.onclick = async () => {
        const zip = new JSZip();
        results.forEach(item => {
            zip.file("REORG_" + item.name, item.content);
        });
        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Evolucoes_Processadas.zip";
        a.click();
    };
</script>
</body>
</html>
