<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ReOrg Médico - UTI Cardíaca</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.browser.js"></script>
    
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --text: #e6edf3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        h2 { color: var(--blue); margin: 0 0 20px 0; font-size: 1.5rem; text-align: center; }
        textarea { width: 100%; height: 180px; background: #010409; color: white; border: 1px solid #30363d; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: monospace; }
        .btn { cursor: pointer; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; font-size: 14px; }
        .btn-blue { background: var(--blue); color: #0d1117; }
        .btn-green { background: var(--green); color: white; display: none; }
        .btn-clear { background: #30363d; color: #f78166; width: auto; padding: 8px 15px; font-size: 11px; float: right; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; background: #010409; font-size: 13px; border-left: 4px solid var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <button class="btn btn-clear" onclick="window.location.reload()">🧹 LIMPAR TUDO</button>
        <h2>⚡ Assistente de Evolução UTI</h2>
        
        <label><b>1. Cole seu Modelo de Referência:</b></label>
        <textarea id="modeloText" placeholder="Ex: IDENTIFICAÇÃO: ... HPI: ... EXAME FÍSICO: ..."></textarea>
        
        <label style="display:block; margin-top:20px;"><b>2. Selecione os arquivos .txt dos pacientes:</b></label>
        <input type="file" id="fileInput" multiple accept=".txt" style="margin-top:10px;">
    </div>

    <div class="card">
        <div id="status">Aguardando arquivos...</div>
        <button class="btn btn-blue" id="btnRun">🚀 REORGANIZAR AGORA</button>
        <button class="btn btn-green" id="btnZip">📥 BAIXAR TODAS AS EVOLUÇÕES (.ZIP)</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4"; // Sua chave integrada
    const btnRun = document.getElementById('btnRun');
    const btnZip = document.getElementById('btnZip');
    const status = document.getElementById('status');
    let results = [];

    btnRun.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        const modelo = document.getElementById('modeloText').value;

        if (!files.length || !modelo) return alert("Por favor, cole o modelo e selecione os arquivos.");

        btnRun.disabled = true;
        btnRun.innerText = "Processando com IA...";
        results = [];

        // Processamento em Paralelo (Jeito de Engenheiro)
        const promessas = Array.from(files).map(async (file) => {
            try {
                const text = await file.text();
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aja como médico intensivista. Reorganize a evolução abaixo seguindo o modelo. Seja fiel aos dados.\n\nMODELO:\n${modelo}\n\nEVOLUÇÃO:\n${text}` }] }]
                    })
                });

                const data = await response.json();
                const finalResult = data.candidates[0].content.parts[0].text;
                
                results.push({ name: file.name.replace('.txt', ''), content: finalResult });
                status.innerHTML = `✅ Processado: ${file.name}`;
            } catch (e) {
                console.error("Erro no arquivo: " + file.name);
            }
        });

        await Promise.all(promessas);

        status.innerHTML = `<b style="color:var(--green)">✅ Concluído! ${results.length} pacientes prontos.</b>`;
        btnZip.style.display = "block";
        btnRun.disabled = false;
        btnRun.innerText = "🚀 REORGANIZAR AGORA";
    };

    btnZip.onclick = async () => {
        const zip = new JSZip();
        
        results.forEach(item => {
            // Adiciona o TXT ao ZIP
            zip.file(`${item.name}.txt`, item.content);
            // Aqui poderíamos adicionar PDF/DOCX, mas para manter leve, vamos focar no TXT organizado
        });

        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Evolucoes_UTI_${new Date().toLocaleDateString()}.zip`;
        a.click();
    };
</script>
</body>
</html>
