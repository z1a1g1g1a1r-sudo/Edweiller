<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReOrg Médico - Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3; --blue: #58a6ff; --green: #238636; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        .btn { cursor: pointer; border: none; padding: 15px; border-radius: 6px; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 15px; font-size: 14px; }
        .btn-primary { background: var(--blue); color: #0d1117; }
        .btn-success { background: var(--green); color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; min-height: 40px; border-left: 3px solid var(--border); padding-left: 15px; }
        .error { color: #f78166; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="color: var(--blue); margin-top: 0;">⚡ ReOrg Médico PRO</h2>
        <label>1. Modelo de Evolução (Referência)</label>
        <textarea id="modeloText" placeholder="Cole o modelo padrão aqui..."></textarea>
        
        <label style="display:block; margin-top:20px;">2. Selecionar Arquivos (.txt)</label>
        <input type="file" id="fileInput" multiple accept=".txt" style="margin-top:10px;">
    </div>

    <div class="card">
        <div id="status">Aguardando arquivos...</div>
        <button class="btn btn-primary" id="btnRun">🚀 Iniciar Reorganização</button>
        <button class="btn btn-success" id="btnZip">📥 Baixar Tudo (.ZIP)</button>
    </div>
</div>

<script>
    // --- COLE SUA CHAVE ABAIXO ---
    const MINHA_CHAVE = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4";

    const btnRun = document.getElementById('btnRun');
    const btnZip = document.getElementById('btnZip');
    const status = document.getElementById('status');
    let finalResults = [];

    // Lista de possíveis IDs de modelos para tentar em caso de erro 404
    const MODEL_VARIANTS = ["gemini-1.5-flash", "gemini-1.5-flash-latest", "gemini-1.5-flash-001", "gemini-1.5-flash-002"];

    btnRun.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        const modelo = document.getElementById('modeloText').value;

        if (!MINHA_CHAVE || MINHA_CHAVE.includes("COLE")) return alert("Configure a API KEY!");
        if (files.length === 0 || !modelo) return alert("Selecione arquivos e preencha o modelo.");

        btnRun.disabled = true;
        btnZip.style.display = "none";
        finalResults = [];
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerHTML = `⏳ Processando ${i+1}/${files.length}: <b>${file.name}</b>`;
            
            let success = false;
            let lastError = "";

            // Tenta cada variante do modelo até uma funcionar
            for (const modelId of MODEL_VARIANTS) {
                try {
                    const content = await file.text();
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${MINHA_CHAVE}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Reorganize a evolução abaixo conforme o modelo.\n\nMODELO:\n${modelo}\n\nEVOLUÇÃO:\n${content}` }] }]
                        })
                    });

                    const data = await resp.json();

                    if (resp.ok && data.candidates) {
                        finalResults.push({ name: `REORG_${file.name}`, content: data.candidates[0].content.parts[0].text });
                        success = true;
                        break; // Sai do loop de variantes se funcionar
                    } else {
                        lastError = data.error ? data.error.message : "Erro desconhecido";
                    }
                } catch (e) {
                    lastError = e.message;
                }
            }

            if (!success) {
                status.innerHTML = `<span class="error">❌ Falha crítica em ${file.name}: ${lastError}</span>`;
                btnRun.disabled = false;
                return;
            }
        }

        status.innerHTML = `<b style="color: var(--green)">✅ Sucesso! ${finalResults.length} arquivos prontos.</b>`;
        btnZip.style.display = "block";
        btnRun.disabled = false;
    };

    btnZip.onclick = async () => {
        const zip = new JSZip();
        finalResults.forEach(f => zip.file(f.name, f.content));
        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Evolucoes_Processadas.zip`;
        a.click();
    };
</script>
</body>
</html>
