<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReOrg Médico - UTI Cardíaca</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3; --blue: #58a6ff; --green: #238636; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--blue); font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; color: #8b949e; }
        textarea { width: 100%; height: 250px; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; }
        .file-box { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 8px; background: #0d1117; margin-top: 10px; }
        .btn { cursor: pointer; border: none; padding: 14px 20px; border-radius: 6px; font-weight: bold; text-transform: uppercase; width: 100%; transition: 0.2s; font-size: 13px; margin-top: 15px; }
        .btn-primary { background: var(--blue); color: #0d1117; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: var(--green); color: white; display: none; }
        #statusArea { margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 6px; }
        .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(88,166,255,.3); border-radius: 50%; border-top-color: var(--blue); animation: spin 1s ease-in-out infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .file-list { margin-top: 10px; font-size: 12px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>⚡ ReOrg Médico PRO</h2>
        <p style="font-size: 12px; color: #8b949e; margin-bottom: 20px;">Padronização de evoluções via IA - SCMGO</p>
        
        <label>1. Modelo Padrão (Exemplo de Referência)</label>
        <textarea id="modeloText" placeholder="Cole aqui o modelo de como as evoluções devem ser organizadas..."></textarea>
        
        <label style="margin-top:20px;">2. Evoluções Originais (.txt)</label>
        <div class="file-box">
            <input type="file" id="fileInput" multiple accept=".txt">
            <div class="file-list" id="fileNames">Nenhum arquivo selecionado</div>
        </div>
    </div>

    <div class="card">
        <div id="statusArea">Aguardando comando...</div>
        <button class="btn btn-primary" id="btnProcessar">🚀 Reorganizar Evoluções</button>
        <button class="btn btn-success" id="btnDownload">📥 Baixar Tudo (.ZIP)</button>
    </div>
</div>

<script>
    /** * CONFIGURAÇÃO DA CHAVE API 
     * Cole sua chave entre as aspas abaixo
     */
    const MINHA_CHAVE_API = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4";

    const btnProcessar = document.getElementById('btnProcessar');
    const btnDownload = document.getElementById('btnDownload');
    const fileInput = document.getElementById('fileInput');
    const statusArea = document.getElementById('statusArea');
    const fileNames = document.getElementById('fileNames');

    let processedFiles = [];

    // Atualiza lista de arquivos selecionados
    fileInput.onchange = () => {
        const names = Array.from(fileInput.files).map(f => f.name).join(', ');
        fileNames.innerText = names || "Nenhum arquivo selecionado";
    };

    btnProcessar.onclick = async () => {
        const files = fileInput.files;
        const modelo = document.getElementById('modeloText').value;

        if (!MINHA_CHAVE_API || MINHA_CHAVE_API.includes("COLE_SUA_CHAVE")) {
            return alert("Erro: Você não configurou a API Key no código.");
        }
        if (files.length === 0 || !modelo) {
            return alert("Selecione os arquivos e preencha o modelo.");
        }

        btnProcessar.disabled = true;
        btnDownload.style.display = "none";
        processedFiles = [];
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            statusArea.innerHTML = `<div class="loading-spinner"></div> Processando ${i+1}/${files.length}: <b>${file.name}</b>`;
            
            try {
                const text = await file.text();
                
                // Chamada direta para a API do Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE_API}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Aja como um médico assistente. Reorganize a EVOLUÇÃO médica abaixo seguindo estritamente a estrutura e cabeçalhos do MODELO fornecido. Mantenha todos os dados clínicos originais. Retorne apenas o texto final.\n\nMODELO:\n${modelo}\n\nEVOLUÇÃO:\n${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const resultText = data.candidates[0].content.parts[0].text;
                processedFiles.push({ name: `REORD_${file.name}`, content: resultText });

            } catch (err) {
                console.error(err);
                statusArea.innerHTML = `<span style="color:#f78166">❌ Erro no arquivo ${file.name}: ${err.message}</span>`;
                btnProcessar.disabled = false;
                return;
            }
        }

        statusArea.innerHTML = `<span style="color:#3fb950">✅ Concluído! ${processedFiles.length} arquivos processados.</span>`;
        btnDownload.style.display = "block";
        btnProcessar.disabled = false;
    };

    btnDownload.onclick = async () => {
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.name, f.content));
        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = `evolucoes_processadas_${new Date().getTime()}.zip`;
        link.click();
    };
</script>

</body>
</html>
