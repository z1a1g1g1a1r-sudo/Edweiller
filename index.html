<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReOrg Médico - Sistema Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3; --blue: #58a6ff; --green: #238636; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        .btn { cursor: pointer; border: none; padding: 15px; border-radius: 6px; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 15px; font-size: 14px; }
        .btn-primary { background: var(--blue); color: #0d1117; }
        .btn-success { background: var(--green); color: white; display: none; }
        #status { margin-top: 15px; font-size: 13px; min-height: 40px; border-left: 3px solid var(--border); padding-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="color: var(--blue); margin-top: 0;">⚡ ReOrg Médico PRO</h2>
        <p style="font-size: 12px; color: #8b949e;">Processamento via Gemini 1.5 Flash (v1 Estável)</p>
        
        <label style="display:block; margin-bottom:10px; font-weight:bold;">1. MODELO PADRÃO</label>
        <textarea id="modeloText" placeholder="Cole o modelo de referência aqui..."></textarea>
        
        <label style="display:block; margin-top:20px; margin-bottom:10px; font-weight:bold;">2. SELECIONAR ARQUIVOS (.TXT)</label>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="card">
        <div id="status">Aguardando comando...</div>
        <button class="btn btn-primary" id="btnRun">🚀 REORGANIZAR EVOLUÇÕES</button>
        <button class="btn btn-success" id="btnZip">📥 BAIXAR TUDO (.ZIP)</button>
    </div>
</div>

<script>
    // CHAVE API INTEGRADA - SEM ESPAÇOS OU CARACTERES ESPECIAIS
    const MINHA_CHAVE = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4";

    const btnRun = document.getElementById('btnRun');
    const btnZip = document.getElementById('btnZip');
    const status = document.getElementById('status');
    let finalResults = [];

    btnRun.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        const modelo = document.getElementById('modeloText').value;

        if (files.length === 0 || !modelo) {
            alert("Selecione os arquivos e preencha o modelo.");
            return;
        }

        btnRun.disabled = true;
        btnZip.style.display = "none";
        finalResults = [];
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerHTML = `⚙️ Processando ${i+1}/${files.length}: <b>${file.name}</b>`;
            
            try {
                const text = await file.text();
                
                // MUDANÇA CRUCIAL: Usando a versão 'v1' estável e o endpoint direto
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aja como médico assistente de UTI. Reorganize a evolução abaixo seguindo rigorosamente o modelo.\n\nMODELO:\n${modelo}\n\nEVOLUÇÃO:\n${text}` }] }]
                    })
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    finalResults.push({ name: `REORG_${file.name}`, content: data.candidates[0].content.parts[0].text });
                } else {
                    const msg = data.error ? data.error.message : "Erro desconhecido na API";
                    throw new Error(msg);
                }
            } catch (err) {
                status.innerHTML = `<span style="color:#f78166">❌ Falha em ${file.name}: ${err.message}</span>`;
                console.error(err);
                btnRun.disabled = false;
                return;
            }
        }

        status.innerHTML = `<b style="color: var(--green)">✅ Sucesso! ${finalResults.length} arquivos prontos.</b>`;
        btnZip.style.display = "block";
        btnRun.disabled = false;
    };

    btnZip.onclick = async () => {
        const zip = new JSZip();
        finalResults.forEach(f => zip.file(f.name, f.content));
        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Evolucoes_Reorganizadas.zip`;
        a.click();
    };
</script>
</body>
</html>
