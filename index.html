<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ReOrg Médico - Sistema Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 150px; background: #010409; color: white; border: 1px solid #30363d; border-radius: 6px; margin: 10px 0; padding: 10px; }
        .btn { cursor: pointer; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-blue { background: #58a6ff; color: #0d1117; }
        .btn-green { background: #238636; color: white; display: none; }
        #status { margin-top: 15px; font-size: 13px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <h2>ReOrg Médico ⚡</h2>
    
    <label>1. Modelo de Referência</label>
    <textarea id="modeloText" placeholder="Cole o modelo aqui..."></textarea>
    
    <label>2. Evoluções (.txt)</label>
    <input type="file" id="fileInput" multiple accept=".txt" style="display:block; margin: 10px 0;">

    <button class="btn btn-blue" id="btnRun">PROCESSAR AGORA</button>
    <div id="status">Aguardando...</div>
    <button class="btn btn-green" id="btnZip">BAIXAR ZIP</button>
</div>

<script>
    // --- COLE SUA CHAVE EXATAMENTE AQUI ---
    const MINHA_CHAVE = "AIzaSyAuaKdXTRfZzuabGO4UupW2qj5EnQcbaG4";

    const btnRun = document.getElementById('btnRun');
    const status = document.getElementById('status');
    let results = [];

    btnRun.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        const modelo = document.getElementById('modeloText').value;
        const apiKey = MINHA_CHAVE.trim(); // Remove espaços acidentais

        if (!apiKey || apiKey.includes("COLE")) return alert("Insira a chave!");
        if (!files.length || !modelo) return alert("Selecione arquivos e preencha o modelo.");

        btnRun.disabled = true;
        results = [];
        
        for (let i = 0; i < files.length; i++) {
            status.innerHTML = `Processando ${i+1}/${files.length}: ${files[i].name}`;
            const text = await files[i].text();
            
            try {
                // Usando o modelo genérico 'gemini-1.5-flash' que é o mais aceito
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Reorganize conforme o modelo:\n\nMODELO:\n${modelo}\n\nTEXTO:\n${text}` }] }]
                    })
                });

                const data = await resp.json();

                if (resp.ok && data.candidates) {
                    results.push({ name: `REORG_${files[i].name}`, content: data.candidates[0].content.parts[0].text });
                } else {
                    throw new Error(data.error ? data.error.message : "Erro na API");
                }
            } catch (e) {
                status.innerHTML = `<span style="color:#f78166">Erro em ${files[i].name}: ${e.message}</span>`;
                btnRun.disabled = false;
                return;
            }
        }

        status.innerHTML = "✅ Tudo pronto!";
        document.getElementById('btnZip').style.display = "block";
        btnRun.disabled = false;
    };

    document.getElementById('btnZip').onclick = async () => {
        const zip = new JSZip();
        results.forEach(f => zip.file(f.name, f.content));
        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Evolucoes.zip`;
        a.click();
    };
</script>
</body>
</html>
